<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="div-padre">
        <div class="div-escribir">

            <h1>Escribe una Noticia!!</h1>
            <form action="">
                <label>
                    Titulo de la Noticia
                    <input type="text" id="Titulo">
                </label>
                <label>
                    Etiqueta
                    <input type="text" id="Etiqueta">
                </label>
                <label>
                    Autor
                    <input type="text" id="Autor">
                </label>
                <label>
                    Fecha
                    <input type="text" id="Fecha">
                </label>
                <label>
                    Texto de la publicación
                    <textarea name="" id="Texto"></textarea></label>
                <button type="submit" id="btn-añadir">Añadir Noticia</button>
            </form>
        </div>
        <div class="div-noticias" id="div-noticias"></div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
